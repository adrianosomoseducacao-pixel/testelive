<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  text-align: center;
}

.container {
  padding: 20px;
  max-width: 600px;
  margin: 0 auto;
}

h1 {
  font-size: clamp(22px, 5vw, 36px);
  margin-bottom: 20px;
}

#countdown {
  font-size: clamp(20px, 6vw, 32px);
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
  <h1>A live começa em:</h1>
  <div id="countdown">Carregando...</div>
</div>

<script>

window.onload = function() {

// 🔥 CONFIG
var dataEvento = new Date("Mar 25, 2026 15:00:00").getTime();

var linkFormulario = "https://forms.zohopublic.com/sabers/form/LiveFormativaPlataformaClickSaberPlurall1/formperma/5LD4JToeYj2P1CBy58rRVP_H86e2azMkdpyW4DpHbvw";
var linkEvento = "https://teams.microsoft.com/meet/22305340668222?p=j9pNsfJWKuFR9jnrQl";

// 🔥 PARÂMETROS
var params = new URLSearchParams(window.location.search);

// 🔥 SALVA INSCRIÇÃO
if (params.get("ok") === "1") {
  localStorage.setItem("inscrito", "sim");
}

var redirecionado = false;

function atualizar() {

  var el = document.getElementById("countdown");
  if (!el) return; // 🔒 proteção

  var now = new Date().getTime();
  var distance = dataEvento - now;

  // 🔒 ANTES DO EVENTO
  if (distance > 0) {

    var days = Math.floor(distance / (1000 * 60 * 60 * 24));
    var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    var seconds = Math.floor((distance % (1000 * 60)) / 1000);

   if (el) {
    el.innerHTML =
      days + " dias " + hours + "h " + minutes + "m " + seconds + "s";
  }

    return;
  }

  // ⏰ DEPOIS DO EVENTO
  if (!redirecionado) {

    redirecionado = true;

    var inscrito = localStorage.getItem("inscrito") === "sim";

    if (inscrito) {
      window.location.href = linkEvento;
    } else {
      window.location.href = linkFormulario;
    }
  }
}

// 🔁 LOOP
setInterval(atualizar, 1000);

// 🔥 PRIMEIRA EXECUÇÃO
function atualizar() {

  var el = document.getElementById("countdown");

  // 🔒 se não existe, simplesmente não faz nada
  if (!el) return;

  var now = new Date().getTime();
  var distance = dataEvento - now;

  if (distance > 0) {

    var days = Math.floor(distance / (1000 * 60 * 60 * 24));
    var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    var seconds = Math.floor((distance % (1000 * 60)) / 1000);

    el.innerHTML =
      days + " dias " + hours + "h " + minutes + "m " + seconds + "s";

    return;
  }

  if (!redirecionado) {

    redirecionado = true;

    var inscrito = localStorage.getItem("inscrito") === "sim";

    if (inscrito) {
      window.location.href = linkEvento;
    } else {
      window.location.href = linkFormulario;
    }
  }
}

};

</script>

</body>
</html>
