<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  text-align: center;
}

.container {
  padding: 20px;
  max-width: 600px;
  margin: 0 auto;
}

h1 {
  font-size: clamp(22px, 5vw, 36px);
  margin-bottom: 20px;
}

#countdown {
  font-size: clamp(20px, 6vw, 32px);
  font-weight: bold;
  margin-bottom: 20px;
}
</style>
</head>

<body>

<div class="container">
  <h1>A live começa em:</h1>
  <div id="countdown">Carregando...</div>
</div>

<script>

// 🔥 CONFIGURAÇÃO
var dataEvento = new Date("Mar 20, 2026 00:35:00").getTime();

var linkFormulario = "https://forms.zohopublic.com/sabers/form/LiveFormativaPlataformaClickSaberPlurall1/formperma/5LD4JToeYj2P1CBy58rRVP_H86e2azMkdpyW4DpHbvw";
var linkEvento = "https://teams.microsoft.com/meet/22305340668222?p=j9pNsfJWKuFR9jnrQl";

// 🔥 PARÂMETROS
var params = new URLSearchParams(window.location.search);

// 🔥 SE VEIO DO FORM
if (params.get("ok") === "1") {
  localStorage.setItem("inscrito", "sim");
}

// 🔥 SE JÁ É INSCRITO
if (localStorage.getItem("inscrito") === "sim") {
  window.location.href = linkEvento;
}

// ⏳ FUNÇÃO DE CONTAGEM
function atualizarContador() {

  var now = new Date().getTime();
  var distance = dataEvento - now;

  // 🔓 SE CHEGOU A HORA
  if (distance < 0) {
    document.getElementById("countdown").innerHTML = "Redirecionando...";
    window.location.href = linkFormulario;
    return;
  }

  var days = Math.floor(distance / (1000 * 60 * 60 * 24));
  var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
  var seconds = Math.floor((distance % (1000 * 60)) / 1000);

  document.getElementById("countdown").innerHTML =
    days + " dias " + hours + "h " + minutes + "m " + seconds + "s";
}

// 🔁 RODA A CADA SEGUNDO
setInterval(atualizarContador, 1000);

// 🔥 RODA NA HORA (importante)
atualizarContador();

</script>

</body>
</html>
