<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  text-align: center;
}

.container {
  padding: 20px;
  max-width: 800px;
  margin: 0 auto;
}

h1 {
  font-size: clamp(22px, 5vw, 36px);
  margin-bottom: 20px;
}

#countdown {
  font-size: clamp(20px, 6vw, 32px);
  font-weight: bold;
}

iframe {
  width: 100%;
  height: 80vh;
  border: none;
  border-radius: 8px;
}
</style>
</head>

<body>

<div id="conteudo" class="container">
  <h1>A live começa em:</h1>
  <div id="countdown"></div>
</div>

<script>

// 🔥 TESTE: 5 SEGUNDOS A PARTIR DE AGORA
var dataEvento = new Date().getTime() + 5000;

var linkEvento = "https://teams.microsoft.com/meet/22305340668222?p=j9pNsfJWKuFR9jnrQl";

// 🔥 PEGAR PARÂMETRO DA URL
var params = new URLSearchParams(window.location.search);

// 🔥 SE VEIO DO FORM → MARCA COMO INSCRITO
if (params.get("ok") === "1") {
  localStorage.setItem("inscrito", "sim");
}

// 🔥 SE JÁ É INSCRITO → VAI DIRETO
if (localStorage.getItem("inscrito") === "sim") {
  window.location.href = linkEvento;
}

// ⏳ CONTADOR
var x = setInterval(function() {

  var now = new Date().getTime();
  var distance = dataEvento - now;

  var seconds = Math.floor((distance % (1000 * 60)) / 1000);

  document.getElementById("countdown").innerHTML =
    seconds + " segundos";

  // 🔓 LIBERA FORM
  if (distance < 0) {
    clearInterval(x);

    document.getElementById("conteudo").innerHTML = `
      <h1>Preencha para acessar a live</h1>

      <iframe 
        src="https://forms.zohopublic.com/sabers/form/LiveFormativaPlataformaClickSaberPlurall1/formperma/5LD4JToeYj2P1CBy58rRVP_H86e2azMkdpyW4DpHbvw">
      </iframe>
    `;
  }

}, 1000);

</script>

</body>
</html>
