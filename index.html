<script>

// 🔥 CONFIG
var dataEvento = new Date("Mar 25, 2026 15:00:00").getTime();

var linkFormulario = "https://forms.zohopublic.com/sabers/form/LiveFormativaPlataformaClickSaberPlurall1/formperma/5LD4JToeYj2P1CBy58rRVP_H86e2azMkdpyW4DpHbvw";
var linkEvento = "https://teams.microsoft.com/meet/22305340668222?p=j9pNsfJWKuFR9jnrQl";

// 🔥 PARÂMETROS
var params = new URLSearchParams(window.location.search);

// 🔥 SALVA INSCRIÇÃO
if (params.get("ok") === "1") {
  localStorage.setItem("inscrito", "sim");
}

// 🔒 CONTROLE
var redirecionado = false;

// ⏳ FUNÇÃO
function atualizar() {

  if (redirecionado) return;

  var now = new Date().getTime();
  var distance = dataEvento - now;

  // 🔥 REGRA ABSOLUTA: ANTES DO EVENTO → NUNCA REDIRECIONA
  if (distance > 0) {

    var days = Math.floor(distance / (1000 * 60 * 60 * 24));
    var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    var seconds = Math.floor((distance % (1000 * 60)) / 1000);

    document.getElementById("countdown").innerHTML =
      days + " dias " + hours + "h " + minutes + "m " + seconds + "s";

    return; // 🔒 trava total
  }

  // 🔥 SÓ AQUI decide redirecionamento
  redirecionado = true;

  var inscrito = localStorage.getItem("inscrito") === "sim";

  if (inscrito) {
    window.location.replace(linkEvento); // 🔥 melhor que href
  } else {
    window.location.replace(linkFormulario);
  }
}

// 🔁 LOOP
setInterval(atualizar, 1000);

// 🔥 EXECUTA IMEDIATO
atualizar();

</script>
