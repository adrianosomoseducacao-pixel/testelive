<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  text-align: center;
}

.container {
  padding: 20px;
}

h1 {
  font-size: clamp(22px, 5vw, 36px);
  margin-bottom: 20px;
}

#countdown {
  font-size: clamp(20px, 6vw, 32px);
  font-weight: bold;
  margin-bottom: 20px;
}

iframe {
  width: 100%;
  height: 100vh;
  border: none;
}
</style>
</head>

<body>

<div id="conteudo" class="container">
  <h1>A live começa em:</h1>
  <div id="countdown"></div>
</div>

<script>
// 🔥 CONFIGURAÇÕES
var dataEvento = new Date("Mar 25, 2026 15:00:00").getTime();
var linkFormulario = "https://zfrmz.com/cPmVfg2Gk4GZD3tFvE3o";
var linkEvento = "COLOQUE_AQUI_LINK_DO_EVENTO";

// 🔥 SE JÁ SE CADASTROU → VAI DIRETO PRO EVENTO
if (localStorage.getItem("inscrito") === "sim") {
  window.location.href = linkEvento;
}

// ⏳ CONTAGEM
var x = setInterval(function() {

  var now = new Date().getTime();
  var distance = dataEvento - now;

  var days = Math.floor(distance / (1000 * 60 * 60 * 24));
  var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
  var seconds = Math.floor((distance % (1000 * 60)) / 1000);

  document.getElementById("countdown").innerHTML =
    days + " dias " + hours + "h " + minutes + "m " + seconds + "s";

  // 🔓 QUANDO CHEGAR A HORA → CARREGA FORM NA MESMA PÁGINA
  if (distance < 0) {
    clearInterval(x);

    document.getElementById("conteudo").innerHTML = `
      <iframe src="${linkFormulario}"></iframe>
    `;
  }

}, 1000);

// 🔥 DETECTA SE VOLTOU DO FORM (E SALVA COMO INSCRITO)
if (window.location.href.includes("zfrmz.com")) {
  localStorage.setItem("inscrito", "sim");
}
</script>

</body>
</html>
