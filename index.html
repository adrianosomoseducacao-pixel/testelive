<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  text-align: center;
}

.container {
  padding: 20px;
  max-width: 600px;
  margin: 0 auto;
}

h1 {
  font-size: clamp(22px, 5vw, 36px);
  margin-bottom: 20px;
}

#countdown {
  font-size: clamp(20px, 6vw, 32px);
  font-weight: bold;
  margin-bottom: 20px;
}

.info {
  font-size: 14px;
  opacity: 0.8;
}
</style>
</head>

<body>

<div class="container">
  <h1>A live começa em:</h1>
  <div id="countdown"></div>
  <div class="info">Você será direcionado automaticamente</div>
</div>

<script>

// 🔥 TESTE: 5 SEGUNDOS
var dataEvento = new Date().getTime() + 5000;

// 🔥 LINKS
var linkFormulario = "https://zfrmz.com/cPmVfg2Gk4GZD3tFvE3o";
var linkEvento = "https://teams.microsoft.com/meet/22305340668222?p=j9pNsfJWKuFR9jnrQl";

// 🔥 PARÂMETROS
var params = new URLSearchParams(window.location.search);

// 🔥 SE VEIO DO FORM
if (params.get("ok") === "1") {
  localStorage.setItem("inscrito", "sim");
}

// 🔥 SE JÁ É INSCRITO
if (localStorage.getItem("inscrito") === "sim") {
  window.location.href = linkEvento;
}

// ⏳ CONTADOR
var x = setInterval(function() {

  var now = new Date().getTime();
  var distance = dataEvento - now;

  var seconds = Math.floor((distance % (1000 * 60)) / 1000);

  document.getElementById("countdown").innerHTML =
    seconds + " segundos";

  // 🔓 REDIRECIONA PRO FORM
  if (distance < 0) {
    clearInterval(x);

    document.getElementById("countdown").innerHTML = "Redirecionando...";

    window.location.href = linkFormulario;
  }

}, 1000);

</script>

</body>
</html>
